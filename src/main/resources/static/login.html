<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aperture - Sign in to manage your HLS video pipeline">
    <title>Aperture - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="ambient"></div>

    <nav class="topbar">
        <div class="topbar__brand">
            <svg class="topbar__logo" width="24" height="24" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.4" />
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.4" />
                <line x1="12" y1="2" x2="12" y2="8" stroke="currentColor" stroke-width="1.4" />
                <line x1="12" y1="16" x2="12" y2="22" stroke="currentColor" stroke-width="1.4" />
                <line x1="2" y1="12" x2="8" y2="12" stroke="currentColor" stroke-width="1.4" />
                <line x1="16" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.4" />
            </svg>
            <span class="topbar__name">Aperture</span>
        </div>
        <span class="topbar__tag">Studio Access</span>
    </nav>

    <main class="auth">
        <section class="auth__card panel">
            <h1 class="auth__title">HLS Video Pipeline</h1>
            <p class="auth__subtitle">Sign in to upload and manage your videos.</p>

            <div class="auth__tabs" role="tablist" aria-label="Authentication mode">
                <button id="tab-login" class="auth__tab auth__tab--active" type="button" role="tab"
                    aria-selected="true" aria-controls="login-form">Login</button>
                <button id="tab-register" class="auth__tab" type="button" role="tab" aria-selected="false"
                    aria-controls="register-form">Register</button>
            </div>

            <form id="login-form" class="auth__form" role="tabpanel" aria-labelledby="tab-login">
                <label class="auth__label" for="login-username">Username</label>
                <input id="login-username" class="auth__input" type="text" required>

                <label class="auth__label" for="login-password">Password</label>
                <div class="auth__pw-wrap">
                    <input id="login-password" class="auth__input auth__input--pw" type="password" required>
                    <button class="auth__pw-toggle" type="button" data-target="login-password"
                        aria-label="Show password">
                        <svg class="auth__pw-icon auth__pw-icon--show" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <svg class="auth__pw-icon auth__pw-icon--hide" viewBox="0 0 24 24" fill="none" aria-hidden="true" hidden>
                            <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M10.6 6.2A11.9 11.9 0 0 1 12 6c6.5 0 10 6 10 6a16.8 16.8 0 0 1-3.1 3.8M6.2 9A17.1 17.1 0 0 0 2 12s3.5 6 10 6c.6 0 1.2-.1 1.8-.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <button class="auth__btn" type="submit" data-default-text="Login">Login</button>
                <p class="auth__switch">
                    New here?
                    <button class="auth__switch-link" id="go-register" type="button">Create an account</button>
                </p>
            </form>

            <form id="register-form" class="auth__form" role="tabpanel" aria-labelledby="tab-register" hidden>
                <label class="auth__label" for="register-username">Username</label>
                <input id="register-username" class="auth__input" type="text" required>

                <label class="auth__label" for="register-password">Password</label>
                <div class="auth__pw-wrap">
                    <input id="register-password" class="auth__input auth__input--pw" type="password" required>
                    <button class="auth__pw-toggle" type="button" data-target="register-password"
                        aria-label="Show password">
                        <svg class="auth__pw-icon auth__pw-icon--show" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <svg class="auth__pw-icon auth__pw-icon--hide" viewBox="0 0 24 24" fill="none" aria-hidden="true" hidden>
                            <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M10.6 6.2A11.9 11.9 0 0 1 12 6c6.5 0 10 6 10 6a16.8 16.8 0 0 1-3.1 3.8M6.2 9A17.1 17.1 0 0 0 2 12s3.5 6 10 6c.6 0 1.2-.1 1.8-.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <label class="auth__label" for="register-confirm-password">Confirm Password</label>
                <div class="auth__pw-wrap">
                    <input id="register-confirm-password" class="auth__input auth__input--pw" type="password" required>
                    <button class="auth__pw-toggle" type="button" data-target="register-confirm-password"
                        aria-label="Show password">
                        <svg class="auth__pw-icon auth__pw-icon--show" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <svg class="auth__pw-icon auth__pw-icon--hide" viewBox="0 0 24 24" fill="none" aria-hidden="true" hidden>
                            <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M10.6 6.2A11.9 11.9 0 0 1 12 6c6.5 0 10 6 10 6a16.8 16.8 0 0 1-3.1 3.8M6.2 9A17.1 17.1 0 0 0 2 12s3.5 6 10 6c.6 0 1.2-.1 1.8-.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>

                <button class="auth__btn" type="submit" data-default-text="Create Account">Create Account</button>
                <p class="auth__switch">
                    Already have an account?
                    <button class="auth__switch-link" id="go-login" type="button">Sign in</button>
                </p>
            </form>

            <p id="auth-msg" class="auth__msg"></p>
        </section>
    </main>

    <script src="login.js"></script>
</body>

</html>
